name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    name: Build macOS app bundles
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build arm64 bundle
        run: ./packaging/build-app.sh --arch arm64

      - name: Zip arm64 bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Knowledge Manager.app" "Knowledge-Manager-arm64.zip"
          rm -rf "Knowledge Manager.app"

      - name: Build x64 bundle
        run: ./packaging/build-app.sh --arch x64

      - name: Zip x64 bundle
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "Knowledge Manager.app" "Knowledge-Manager-x64.zip"
          rm -rf "Knowledge Manager.app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: dist/*.zip

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: bundles
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          generate_release_notes: true

  pages:
    name: Deploy GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deploy
        uses: actions/deploy-pages@v4
